
<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SKAW Duty Calculator V4.1</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Segoe UI,Arial;background:#08192d;color:#fff}
header{background:linear-gradient(90deg,#0b5ed7,#1d8cff);padding:18px;text-align:center;font-size:24px;font-weight:bold}
.wrap{max-width:1150px;margin:auto;padding:18px}
.grid{display:grid;grid-template-columns:1.4fr 1fr;gap:18px}
.card{background:#102846;border:1px solid #2f72d6;border-radius:16px;padding:18px}
label{display:block;margin:10px 0 6px}
input{width:100%;padding:12px;border-radius:10px;border:1px solid #3a7ee0;background:#0a1b30;color:#fff}
.row{display:flex;gap:8px}
.row input{flex:1}
button{border:none;border-radius:10px;padding:12px;font-weight:bold;cursor:pointer}
.pm{background:#255fb8;color:#fff;width:55px}
.add{background:#1984ff;color:#fff}
.undo{background:#3d5f8f;color:#fff;flex:1}
.reset{background:#d9534f;color:#fff;flex:1}
.stat{display:flex;justify-content:space-between;background:#0a1b30;padding:10px;border-radius:10px;margin:8px 0}
.hist{background:#071321;padding:10px;border-radius:10px;min-height:90px;max-height:120px;overflow:auto}
.big{font-size:30px;color:#6bc6ff;font-weight:bold;text-align:center}
@media(max-width:850px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>🔧 STREETKING AUTOWORKS - DUTY CALCULATOR</header>

<div class="wrap">
<div class="grid">

<div class="card">
<label>Tanggal Duty</label>
<input id="tanggal" type="date">

<label>Nama Mekanik</label>
<input id="nama">

<label>Workshop</label>
<input id="workshop">

<label>Deposit ($)</label>
<input id="deposit" type="number" value="0" oninput="calc()">

<h3>Component</h3>
<div class="stat"><span>Total</span><b id="tc">0</b></div>
<div class="row">
<button class="pm" onclick="step(cin,-10)">-10</button>
<button class="pm" onclick="step(cin,-1)">-</button>
<input id="cin" type="number" value="0">
<button class="pm" onclick="step(cin,1)">+</button>
<button class="pm" onclick="step(cin,10)">+10</button>
<button class="add" onclick="add('c')">Tambah</button>
</div>
<div class="row" style="margin-top:8px">
<button class="undo" onclick="undo('c')">↶ Batalkan Input Terakhir</button>
<button class="reset" onclick="resetType('c')">Reset</button>
</div>
<div class="hist" id="ch"></div>

<h3>Material</h3>
<div class="stat"><span>Total</span><b id="tm">0</b></div>
<div class="row">
<button class="pm" onclick="step(min,-10)">-10</button>
<button class="pm" onclick="step(min,-1)">-</button>
<input id="min" type="number" value="0">
<button class="pm" onclick="step(min,1)">+</button>
<button class="pm" onclick="step(min,10)">+10</button>
<button class="add" onclick="add('m')">Tambah</button>
</div>
<div class="row" style="margin-top:8px">
<button class="undo" onclick="undo('m')">↶ Batalkan Input Terakhir</button>
<button class="reset" onclick="resetType('m')">Reset</button>
</div>
<div class="hist" id="mh"></div>

<button class="reset" style="width:100%;margin-top:12px" onclick="resetAll()">🗑 Reset Semua Duty</button>
</div>

<div class="card">
<h3>Ringkasan</h3>
<div class="stat"><span>Biaya Component</span><b id="bc">$0</b></div>
<div class="stat"><span>Biaya Material</span><b id="bm">$0</b></div>
<div class="stat"><span>Total Pemakaian</span><b id="cost">$0</b></div>
<div class="stat"><span>Deposit</span><b id="dep">$0</b></div>
<div class="big" id="net">$0</div>
<button class="add" style="width:100%" onclick="copyRep()">📋 Copy Duty Report</button>
</div>

</div></div>

<script>
let comp=0,mat=0,chist=[],mhist=[];
const C=2.4,M=1.9;
const money=n=>"$"+Number(n).toLocaleString("id-ID",{maximumFractionDigits:2});
tanggal.value=new Date().toISOString().split("T")[0];
function step(el,v){el.value=Math.max(0,(+el.value||0)+v)}
function render(){ch.innerHTML=chist.map(x=>"+ "+x).join("<br>");mh.innerHTML=mhist.map(x=>"+ "+x).join("<br>")}
function calc(){let d=+deposit.value||0,cb=comp*C,mb=mat*M,t=cb+mb;tc.textContent=comp;tm.textContent=mat;bc.textContent=money(cb);bm.textContent=money(mb);cost.textContent=money(t);dep.textContent=money(d);net.textContent=money(d-t)}
function add(t){let i=t=="c"?cin:min,v=+i.value||0;if(!v)return;if(t=="c"){comp+=v;chist.push(v)}else{mat+=v;mhist.push(v)}i.value=0;render();calc();i.focus()}
function undo(t){if(t=="c"&&chist.length){comp-=chist.pop()}if(t=="m"&&mhist.length){mat-=mhist.pop()}render();calc()}
function resetType(t){if(t=="c"){comp=0;chist=[];cin.value=0}else{mat=0;mhist=[];min.value=0}render();calc()}
function resetAll(){deposit.value=0;resetType('c');resetType('m')}
function copyRep(){
calc();
navigator.clipboard.writeText(`__**DUTY REPORT MEKANIK STREETKING AUTOWORKS**__

* Tanggal : ${tanggal.value}
* Nama : ${nama.value}
* Workshop : ${workshop.value}
* Deposit : ${dep.textContent}

* Pemakaian Component : ${comp} x 2.4 = ${bc.textContent}
* Pemakaian Material : ${mat} x 1.9 = ${bm.textContent}

* Total Pemakaian bahan baku : ${cost.textContent}

* Hasil Duty Bersihnya : ${net.textContent}`);
alert("Duty Report berhasil disalin!");
}
calc();
</script>
</body>
</html>
